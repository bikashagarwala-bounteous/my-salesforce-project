name: Deploy to QA

on:
  push:
    branches: [development]

jobs:
  deploy-qa:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli@latest

      - name: Authenticate to Salesforce (QA org)
        run: |
          echo "${{ secrets.SALESFORCE_JWT_KEY }}" > jwt.key
          sf org login jwt \
            --client-id ${{ secrets.SALESFORCE_CLIENT_ID }} \
            --jwt-key-file jwt.key \
            --username ${{ secrets.SALESFORCE_USERNAME }} \
            --instance-url https://login.salesforce.com \
            --alias qa-org \
            --set-default
          rm jwt.key

      - name: Deploy to QA org
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org qa-org \
            --wait 30 \
            --test-level RunLocalTests

      - name: Notify on success
        run: |
          echo "## ✅ Deployed to QA" >> $GITHUB_STEP_SUMMARY
          echo "Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY