name: PR Quality Check

on:
  pull_request:
    branches:
      - development
    types: [opened, edited, synchronize, reopened]

env:
  MIN_COVERAGE: 75

jobs:
  # ═══════════════════════════════════════════════════
  # JOB 1 — Code Analysis & Linting
  # Runs: Code Analyzer (Apex/PMD) + ESLint (LWC/JS)
  # Gate: Critical violations or ESLint errors block merge
  # ═══════════════════════════════════════════════════
  code-analysis:
    name: Code Analysis & Linting
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache SF CLI
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/sf
            ~/.npm
          key: sf-cli-${{ runner.os }}-${{ hashFiles('**/package.json') }}
          restore-keys: sf-cli-${{ runner.os }}-

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli@latest

      - name: Install Code Analyzer (PMD)
        run: sf plugins install @salesforce/sfdx-scanner@latest

      - name: Install ESLint + LWC plugins
        run: |
          npm install -g eslint \
            @lwc/eslint-plugin-lwc \
            @salesforce/eslint-plugin-aura \
            @salesforce/eslint-config-lwc \
            eslint-plugin-import \
            eslint-plugin-jest

      # ── Detect changed files by type ──
      - name: Detect changed Apex files
        id: apex-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.cls
            **/*.trigger

      - name: Detect changed LWC files
        id: lwc-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/lwc/**/*.js
            **/lwc/**/*.html

      # ── Apex: Code Analyzer ──
      - name: Run Code Analyzer on changed Apex files
        if: steps.apex-files.outputs.any_changed == 'true'
        id: scan
        continue-on-error: true
        run: |
          FORMATTED=$(echo "${{ steps.apex-files.outputs.all_changed_files }}" \
            | tr ' ' ',')

          sf scanner run \
            --target  "$FORMATTED" \
            --format  json \
            --outfile scan_raw.json \
            --engine  pmd || true

          # Ensure file exists even if scanner produced nothing
          [ -f scan_raw.json ] || echo '[]' > scan_raw.json

          # Normalise to a consistent shape, drop NoTrailingWhitespace noise
          jq '
            (if type == "array" then . else [] end)
            | map(select(
                (.ruleName // .rule // "") |
                test("NoTrailingWhitespace"; "i") | not
              ))
            | {
                violations: .,
                counts: {
                  total:    length,
                  critical: (map(select(.severity == 1)) | length),
                  high:     (map(select(.severity == 2)) | length),
                  medium:   (map(select(.severity == 3)) | length),
                  low:      (map(select(.severity == 4)) | length),
                  info:     (map(select(.severity == 5)) | length)
                }
              }
          ' scan_raw.json > scan_results.json

          TOTAL=$(jq '.counts.total'    scan_results.json)
          CRIT=$( jq '.counts.critical' scan_results.json)
          HIGH=$( jq '.counts.high'     scan_results.json)

          echo "total=$TOTAL"     >> $GITHUB_OUTPUT
          echo "critical=$CRIT"   >> $GITHUB_OUTPUT
          echo "high=$HIGH"       >> $GITHUB_OUTPUT
          echo "ran=true"         >> $GITHUB_OUTPUT
          echo "Apex scan: $TOTAL violations ($CRIT critical, $HIGH high)"

      - name: Skip Apex scan — no Apex files changed
        if: steps.apex-files.outputs.any_changed != 'true'
        run: |
          echo '{"violations":[],"counts":{"total":0,"critical":0,"high":0,"medium":0,"low":0,"info":0}}' \
            > scan_results.json
          echo "total=0 critical=0 high=0 ran=false" | \
            tr ' ' '\n' >> $GITHUB_OUTPUT

      # ── LWC: ESLint ──
      - name: Create ESLint config
        run: |
          cat > .eslintrc.json << 'EOF'
          {
            "extends": ["@salesforce/eslint-config-lwc/recommended"],
            "plugins": ["@lwc/eslint-plugin-lwc"],
            "rules": {
              "no-unused-vars":                    "warn",
              "no-console":                        "warn",
              "no-debugger":                       "error",
              "@lwc/lwc/no-api-reassignments":     "error",
              "@lwc/lwc/no-document-query":        "warn",
              "@lwc/lwc/no-async-operation":       "warn"
            }
          }
          EOF

      - name: Run ESLint on changed LWC files
        if: steps.lwc-files.outputs.any_changed == 'true'
        id: eslint
        continue-on-error: true
        run: |
          eslint ${{ steps.lwc-files.outputs.all_changed_files }} \
            --format json \
            --output-file eslint_results.json || true

          [ -f eslint_results.json ] || echo '[]' > eslint_results.json

          ERRORS=$(  jq '[.[].messages[] | select(.severity==2)] | length' \
            eslint_results.json)
          WARNINGS=$(jq '[.[].messages[] | select(.severity==1)] | length' \
            eslint_results.json)

          echo "errors=$ERRORS"     >> $GITHUB_OUTPUT
          echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
          echo "ran=true"           >> $GITHUB_OUTPUT
          echo "ESLint: $ERRORS errors, $WARNINGS warnings"

      - name: Skip ESLint — no LWC files changed
        if: steps.lwc-files.outputs.any_changed != 'true'
        run: |
          echo '[]' > eslint_results.json
          echo "errors=0 warnings=0 ran=false" | \
            tr ' ' '\n' >> $GITHUB_OUTPUT

      # ── Upload raw files for manual triage ──
      - name: Upload code analysis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-analysis-${{ github.run_id }}
          path: |
            scan_raw.json
            scan_results.json
            eslint_results.json
          retention-days: 30

      # ── Report ──
      - name: Generate code analysis report
        if: always()
        run: |
          TOTAL=$(   jq '.counts.total'    scan_results.json 2>/dev/null || echo 0)
          CRIT=$(    jq '.counts.critical' scan_results.json 2>/dev/null || echo 0)
          HIGH=$(    jq '.counts.high'     scan_results.json 2>/dev/null || echo 0)
          MED=$(     jq '.counts.medium'   scan_results.json 2>/dev/null || echo 0)
          LOW=$(     jq '.counts.low'      scan_results.json 2>/dev/null || echo 0)
          INFO=$(    jq '.counts.info'     scan_results.json 2>/dev/null || echo 0)
          L_ERR=$(   jq '[.[].messages[] | select(.severity==2)] | length' \
                       eslint_results.json 2>/dev/null || echo 0)
          L_WARN=$(  jq '[.[].messages[] | select(.severity==1)] | length' \
                       eslint_results.json 2>/dev/null || echo 0)

          # Overall status for this job
          STATUS="✅ Passed"
          [ "$CRIT"  -gt 0 ] && STATUS="❌ Failed"
          [ "$L_ERR" -gt 0 ] && STATUS="❌ Failed"

          pass() { [ "$1" -eq 0 ] && echo "✅ Pass" || echo "$2"; }

          {
            echo "# 🔍 Code Analysis Report"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Status**  | $STATUS |"
            echo "| **PR**      | #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }} |"
            echo "| **Branch**  | \`${{ github.head_ref }}\` → \`${{ github.base_ref }}\` |"
            echo "| **Commit**  | \`$(echo ${{ github.sha }} | cut -c1-8)\` |"
            echo "| **Run**     | [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo ""

            # ── Apex section ──
            echo "## Apex — Code Analyzer (PMD)"
            echo ""
            if [ "${{ steps.apex-files.outputs.any_changed }}" == "true" ]; then
              echo "| Severity   | Count | Gate |"
              echo "|------------|------:|------|"
              echo "| 🔴 Critical | $CRIT  | $([ "$CRIT" -eq 0 ] && echo '✅ Pass' || echo '❌ Fail — **blocks merge**') |"
              echo "| 🟠 High     | $HIGH  | $([ "$HIGH" -eq 0 ] && echo '✅ Pass' || echo '⚠️ Must review before merge') |"
              echo "| 🟡 Medium   | $MED   | $([ "$MED"  -eq 0 ] && echo '✅ Pass' || echo 'ℹ️ Should fix') |"
              echo "| 🔵 Low      | $LOW   | $([ "$LOW"  -eq 0 ] && echo '✅ Pass' || echo 'ℹ️ Optional') |"
              echo "| ⚪ Info     | $INFO  | — |"
              echo "| **Total**  | **$TOTAL** | |"
              echo ""

              if [ "$TOTAL" -gt 0 ]; then
                echo "<details>"
                echo "<summary>View $TOTAL violation(s) — click to expand</summary>"
                echo ""
                echo "| Severity | Rule | File | Line | Message | Suggested fix |"
                echo "|----------|------|------|-----:|---------|---------------|"

                jq -r '
                  .violations
                  | sort_by(.severity, .fileName, .line)
                  | .[]
                  | (if   .severity==1 then "🔴 Critical"
                     elif .severity==2 then "🟠 High"
                     elif .severity==3 then "🟡 Medium"
                     elif .severity==4 then "🔵 Low"
                     else                   "⚪ Info" end) as $sev
                  | (.ruleName // .rule // "Unknown") as $rule
                  | ((.fileName // "") | split("/") | last) as $file
                  | (.line // "?") as $line
                  | (.message // ""
                      | gsub("\n"; " ") | gsub("\|"; "/")
                      | if length > 110 then .[0:107]+"…" else . end) as $msg
                  | (if   ($rule|test("ApexCRUDViolation";"i"))           then "Add CRUD/FLS checks"
                     elif ($rule|test("AvoidDmlStatementsInLoops";"i"))   then "Move DML outside loop"
                     elif ($rule|test("AvoidSoqlInLoops";"i"))            then "Move SOQL outside loop"
                     elif ($rule|test("AvoidDebugStatements";"i"))        then "Remove debug statement"
                     elif ($rule|test("AvoidHardcodingId";"i"))           then "Use Custom Settings/Labels"
                     elif ($rule|test("Cyclomatic|StdCyclomatic";"i"))    then "Break into smaller methods"
                     elif ($rule|test("CognitiveComplexity";"i"))         then "Reduce nesting/complexity"
                     elif ($rule|test("ExcessiveClassLength";"i"))        then "Split into smaller classes"
                     elif ($rule|test("UnusedLocalVariable";"i"))         then "Remove unused variable"
                     elif ($rule|test("no-unused-vars";"i"))              then "Remove unused variable"
                     elif ($rule|test("EmptyIfStmt";"i"))                 then "Add logic or remove block"
                     elif ($rule|test("DebugsShouldUseLoggingLevel";"i")) then "Add logging level param"
                     else "Review Salesforce best practices" end) as $fix
                  | "| \($sev) | `\($rule)` | `\($file)` | \($line) | \($msg) | \($fix) |"
                ' scan_results.json 2>/dev/null \
                  || echo "| ⚠️ | Parse error | — | — | Check raw artifact | — |"

                echo ""
                echo "</details>"
                echo ""

                # Priority callouts
                [ "$CRIT" -gt 0 ] && \
                  echo "> 🔴 **$CRIT critical violation(s) must be fixed — merge is blocked.**"
                [ "$HIGH" -gt 0 ] && \
                  echo "> 🟠 **$HIGH high violation(s) — review and fix before merging.**"
              else
                echo "> ✅ No violations found in the changed Apex files."
              fi
            else
              echo "> ⏭️ No Apex files changed — scan skipped."
            fi
            echo ""

            # ── LWC section ──
            echo "## LWC / JavaScript — ESLint"
            echo ""
            if [ "${{ steps.lwc-files.outputs.any_changed }}" == "true" ]; then
              echo "| Type       | Count | Gate |"
              echo "|------------|------:|------|"
              echo "| ❌ Errors   | $L_ERR  | $([ "$L_ERR"  -eq 0 ] && echo '✅ Pass' || echo '❌ Fail — **blocks merge**') |"
              echo "| ⚠️ Warnings | $L_WARN | $([ "$L_WARN" -eq 0 ] && echo '✅ Pass' || echo 'ℹ️ Review recommended') |"
              echo ""

              if [ "$L_ERR" -gt 0 ] || [ "$L_WARN" -gt 0 ]; then
                echo "<details>"
                echo "<summary>View ESLint issues — click to expand</summary>"
                echo ""
                echo "| Severity | File | Line | Rule | Message |"
                echo "|----------|------|-----:|------|---------|"
                jq -r '
                  .[] | .filePath as $path
                  | ($path | split("/") | last) as $fname
                  | .messages[]
                  | (if .severity==2 then "❌ Error" else "⚠️ Warning" end) as $sev
                  | "| \($sev) | `\($fname)` | \(.line) | `\(.ruleId // "—")` | \(.message) |"
                ' eslint_results.json 2>/dev/null \
                  || echo "| ⚠️ | Parse error | — | — | Check raw artifact |"
                echo ""
                echo "</details>"
              else
                echo "> ✅ No ESLint issues found in the changed LWC files."
              fi
            else
              echo "> ⏭️ No LWC/JS files changed — ESLint skipped."
            fi
            echo ""

            # ── Artifact links ──
            echo "## 📦 Artifacts"
            echo ""
            echo "Download from the **Artifacts** section of this run:"
            echo ""
            echo "| Artifact file | Contents |"
            echo "|---------------|----------|"
            echo "| \`scan_raw.json\`      | Raw PMD output |"
            echo "| \`scan_results.json\`  | Filtered + normalised violations |"
            echo "| \`eslint_results.json\`| ESLint raw output |"

          } >> $GITHUB_STEP_SUMMARY

      # ── Gate ──
      - name: Apex & ESLint gate
        run: |
          CRIT=$(  jq '.counts.critical' scan_results.json    2>/dev/null || echo 0)
          L_ERR=$( jq '[.[].messages[] | select(.severity==2)] | length' \
                     eslint_results.json 2>/dev/null || echo 0)

          echo "════════════════════════════"
          echo "  Gate: Code Analysis"
          echo "  Critical Apex : $CRIT"
          echo "  ESLint errors : $L_ERR"
          echo "════════════════════════════"

          [ "$CRIT"  -gt 0 ] && \
            echo "❌ BLOCKED — fix $CRIT critical Apex violation(s)" && exit 1
          [ "$L_ERR" -gt 0 ] && \
            echo "❌ BLOCKED — fix $L_ERR ESLint error(s)" && exit 1
          echo "✅ Passed"

  # ═══════════════════════════════════════════════════
  # JOB 2 — Metadata Validation & Tests
  # Runs: check-only deploy + specified Apex tests
  # Gate: component errors, test failures, coverage < 75%
  # ═══════════════════════════════════════════════════
  validate-and-test:
    name: Metadata Validation & Tests
    runs-on: ubuntu-latest
    needs: code-analysis
    permissions:
      pull-requests: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli@latest

      - name: Authenticate to Salesforce org
        run: |
          echo "${{ secrets.SALESFORCE_JWT_KEY }}" > jwt.key
          sf org login jwt \
            --client-id    "${{ secrets.SALESFORCE_CLIENT_ID }}" \
            --jwt-key-file jwt.key \
            --username     "${{ secrets.SALESFORCE_USERNAME }}" \
            --instance-url https://login.salesforce.com \
            --alias        target-org \
            --set-default
          rm -f jwt.key

      # ── Read test classes from PR description ──
      # PR description must contain a line like:
      #   Test classes: HelloWorldTest, AccountManagerTest
      - name: Extract test classes from PR description
        id: pr-tests
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          TEST_CLASSES=$(echo "$PR_BODY" \
            | grep -i "^test classes:" \
            | head -1 \
            | sed 's/.*[Tt]est [Cc]lasses://i' \
            | tr -d ' `' \
            | sed 's/,$//')

          if [ -z "$TEST_CLASSES" ]; then
            echo "⚠️ No test classes found in PR description"
            echo "has-tests=false" >> $GITHUB_OUTPUT
            echo "test-classes="   >> $GITHUB_OUTPUT
          else
            echo "✅ Test classes: $TEST_CLASSES"
            echo "has-tests=true"             >> $GITHUB_OUTPUT
            echo "test-classes=$TEST_CLASSES" >> $GITHUB_OUTPUT
          fi

      # ── Deploy + run tests in one step ──
      # Using a real deploy (not --dry-run) so test classes
      # exist in the org when tests run.
      - name: Deploy & run specified tests
        id: deploy
        run: |
          mkdir -p test-results

          if [ "${{ steps.pr-tests.outputs.has-tests }}" == "true" ]; then
            TESTS_SPACED=$(echo "${{ steps.pr-tests.outputs.test-classes }}" \
              | tr ',' ' ')
            echo "Running deploy + tests: $TESTS_SPACED"

            sf project deploy start \
              --source-dir force-app \
              --target-org target-org \
              --wait       30 \
              --test-level RunSpecifiedTests \
              --tests      $TESTS_SPACED \
              --coverage-formatters json \
              --coverage-formatters json-summary \
              --results-dir test-results \
              --json > deploy_output.json 2>&1 || true
          else
            echo "No tests specified — deploying without test run"
            sf project deploy start \
              --source-dir force-app \
              --target-org target-org \
              --wait       30 \
              --test-level NoTestRun \
              --json > deploy_output.json 2>&1 || true
          fi

          # ── Parse deploy result ──
          STATUS=$(   jq -r '.result.status               // "Unknown"' deploy_output.json 2>/dev/null || echo "Unknown")
          DEPLOY_ID=$(jq -r '.result.id                   // "—"'       deploy_output.json 2>/dev/null || echo "—")
          COMP_TOT=$( jq -r '.result.numberComponentsDeployed // 0'     deploy_output.json 2>/dev/null || echo 0)
          COMP_ERR=$( jq -r '.result.numberComponentErrors    // 0'     deploy_output.json 2>/dev/null || echo 0)
          PASSING=$(  jq    '.result.numberTestsCompleted      // 0'    deploy_output.json 2>/dev/null || echo 0)
          FAILING=$(  jq    '.result.numberTestErrors           // 0'   deploy_output.json 2>/dev/null || echo 0)

          echo "status=$STATUS"         >> $GITHUB_OUTPUT
          echo "deploy-id=$DEPLOY_ID"   >> $GITHUB_OUTPUT
          echo "comp-total=$COMP_TOT"   >> $GITHUB_OUTPUT
          echo "comp-errors=$COMP_ERR"  >> $GITHUB_OUTPUT
          echo "passing=$PASSING"       >> $GITHUB_OUTPUT
          echo "failing=$FAILING"       >> $GITHUB_OUTPUT

          # ── Parse coverage ──
          # Try json-summary first — cleanest format
          SUMMARY=$(find test-results -name "coverage-summary.json" | head -1)
          DETAIL=$(  find test-results -name "coverage.json"         | head -1)
          COVERAGE=0

          if [ -n "$SUMMARY" ]; then
            COVERAGE=$(jq '
              .total.lines.pct // .total.statements.pct // 0 | floor
            ' "$SUMMARY" 2>/dev/null || echo 0)
          fi

          # Fallback: detail file (istanbul/nyc object format)
          if [ "$COVERAGE" -eq 0 ] && [ -n "$DETAIL" ]; then
            COVERAGE=$(jq '
              if type == "object" then
                [ to_entries[].value.s // {} | to_entries[] ] as $stmts |
                ($stmts | map(select(.value  > 0)) | length) as $hit   |
                ($stmts | length) as $total |
                if $total > 0 then ($hit * 100 / $total | floor) else 0 end
              else 0 end
            ' "$DETAIL" 2>/dev/null || echo 0)
          fi

          # Fallback: pull directly from deploy JSON
          if [ "$COVERAGE" -eq 0 ]; then
            COVERAGE=$(jq '
              .result.runTestResult.codeCoverage // [] |
              if length > 0 then
                (map(.numLocations)            | add // 0) as $tot  |
                (map(.numLocationsNotCovered)  | add // 0) as $miss |
                if $tot > 0
                then (($tot - $miss) * 100 / $tot | floor)
                else 0 end
              else 0 end
            ' deploy_output.json 2>/dev/null || echo 0)
          fi

          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Deploy: $STATUS | Components: $COMP_TOT ($COMP_ERR errors) | Tests: $PASSING passed, $FAILING failed | Coverage: $COVERAGE%"

      # ── Upload everything for triage ──
      - name: Upload deploy & test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-test-results-${{ github.run_id }}
          path: |
            deploy_output.json
            test-results/
          retention-days: 30

      # ── Report ──
      - name: Generate validation & test report
        if: always()
        run: |
          STATUS="${{ steps.deploy.outputs.status }}"
          DEPLOY_ID="${{ steps.deploy.outputs.deploy-id }}"
          COMP_TOT="${{ steps.deploy.outputs.comp-total }}"
          COMP_ERR="${{ steps.deploy.outputs.comp-errors }}"
          HAS_TESTS="${{ steps.pr-tests.outputs.has-tests }}"
          TEST_CLASSES="${{ steps.pr-tests.outputs.test-classes }}"
          PASSING="${{ steps.deploy.outputs.passing }}"
          FAILING="${{ steps.deploy.outputs.failing }}"
          COVERAGE="${{ steps.deploy.outputs.coverage }}"

          # Overall status
          JOB_STATUS="✅ Passed"
          [ "$COMP_ERR" -gt 0 ]  && JOB_STATUS="❌ Failed"
          [ "$FAILING"  -gt 0 ]  && JOB_STATUS="❌ Failed"
          if [ "$HAS_TESTS" == "true" ] && \
             (( $(echo "${COVERAGE:-0} < ${{ env.MIN_COVERAGE }}" | bc -l) )); then
            JOB_STATUS="❌ Failed"
          fi

          {
            echo "# 🚀 Metadata Validation & Test Report"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Status**      | $JOB_STATUS |"
            echo "| **Deploy ID**   | \`$DEPLOY_ID\` |"
            echo "| **Deploy status** | $STATUS |"
            echo "| **Components**  | $COMP_TOT deployed, $COMP_ERR error(s) |"
            echo "| **Test level**  | $([ "$HAS_TESTS" == "true" ] \
                   && echo "RunSpecifiedTests" || echo "NoTestRun") |"
            echo ""

            # ── Component errors ──
            if [ "${COMP_ERR:-0}" -gt 0 ]; then
              echo "## ❌ Component Errors"
              echo ""
              echo "| File | Error |"
              echo "|------|-------|"
              jq -r '
                .result.details.componentFailures[]?
                | "| `\(.fileName // "Unknown")` | \(.problem // "Unknown error") |"
              ' deploy_output.json 2>/dev/null \
                || echo "| — | Could not parse — download artifact for details |"
              echo ""
            fi

            # ── Test results ──
            echo "## 🧪 Test Results"
            echo ""

            if [ "$HAS_TESTS" == "true" ]; then
              COV_ICON="✅"
              (( $(echo "${COVERAGE:-0} < ${{ env.MIN_COVERAGE }}" | bc -l) )) \
                && COV_ICON="❌"

              echo "**Classes run:** \`$TEST_CLASSES\`"
              echo ""
              echo "| Metric | Value | Gate |"
              echo "|--------|------:|------|"
              echo "| ✅ Passing   | $PASSING | — |"
              echo "| ❌ Failing   | $FAILING | $([ "${FAILING:-0}" -eq 0 ] \
                     && echo '✅ Pass' || echo '❌ Fail — must fix') |"
              echo "| 🎯 Coverage  | ${COVERAGE}% | $COV_ICON $([ "$COV_ICON" == "✅" ] \
                     && echo "≥ ${{ env.MIN_COVERAGE }}%" \
                     || echo "< ${{ env.MIN_COVERAGE }}% — **must fix**") |"
              echo ""

              # Per-class coverage from deploy output
              COV_ROWS=$(jq -r '
                .result.runTestResult.codeCoverage[]?
                | (.numLocations            // 0) as $tot  |
                  (.numLocationsNotCovered  // 0) as $miss |
                  ($tot - $miss)                  as $cov  |
                  (if $tot > 0 then ($cov * 100 / $tot | floor) else 0 end) as $pct |
                  (if $pct >= 75 then "✅" else "❌" end) as $icon |
                "| `\(.name)` | \($icon) \($pct)% | \($cov) / \($tot) |"
              ' deploy_output.json 2>/dev/null)

              if [ -n "$COV_ROWS" ]; then
                echo "<details>"
                echo "<summary>📊 Per-class coverage — click to expand</summary>"
                echo ""
                echo "| Class | Coverage | Lines (covered / total) |"
                echo "|-------|:--------:|------------------------:|"
                echo "$COV_ROWS"
                echo ""
                echo "</details>"
                echo ""
              fi

              # Per-method results
              METHOD_ROWS=$(jq -r '
                .result.runTestResult.successes[]?,
                .result.runTestResult.failures[]?
                | (if .methodName then "✅" else "❌" end) as $icon
                | "| `\(.name // "—")` | `\(.methodName // "—")` | \($icon) |"
              ' deploy_output.json 2>/dev/null)

              if [ -n "$METHOD_ROWS" ]; then
                echo "<details>"
                echo "<summary>📋 Per-method results — click to expand</summary>"
                echo ""
                echo "| Class | Method | Result |"
                echo "|-------|--------|--------|"
                echo "$METHOD_ROWS"
                echo ""
                echo "</details>"
                echo ""
              fi

              # Failing test details
              if [ "${FAILING:-0}" -gt 0 ]; then
                echo "### ❌ Failing test details"
                echo ""
                jq -r '
                  .result.runTestResult.failures[]?
                  | "**`\(.name).\(.methodName)`**\n\n> \(.message // "No message")\n\n```\n\(.stackTrace // "No stack trace")\n```\n"
                ' deploy_output.json 2>/dev/null \
                  || echo "Could not parse — download artifact for details"
                echo ""
              fi
            else
              echo "> ⚠️ No test classes were specified in the PR description."
              echo ">"
              echo "> Add this line to your PR description to run tests:"
              echo "> \`\`\`"
              echo "> Test classes: HelloWorldTest, AccountManagerTest"
              echo "> \`\`\`"
            fi

            # ── Triage guide ──
            echo "## 🔧 How to fix failures"
            echo ""
            echo "<details>"
            echo "<summary>Expand triage guide</summary>"
            echo ""
            echo "### Component errors"
            echo "- Check the table above for the exact file and error message"
            echo "- Use Deploy ID \`$DEPLOY_ID\` in **Salesforce Setup → Deployment Status** for full details"
            echo "- Download the \`deploy-test-results\` artifact → open \`deploy_output.json\`"
            echo ""
            echo "### Test failures"
            echo "- Read the failing test details above for the exact error and stack trace"
            echo "- Run locally: \`sf apex run test --class-names YourTestClass --target-org my-dev-org --result-format human\`"
            echo ""
            echo "### Coverage below ${{ env.MIN_COVERAGE }}%"
            echo "- Check the per-class coverage table above to see which classes need more tests"
            echo "- Add test methods that exercise the uncovered lines"
            echo "- Run locally to check: \`sf apex run test --class-names YourTestClass --target-org my-dev-org --code-coverage --result-format human\`"
            echo ""
            echo "### Deploy status shows Failed but 0 component errors"
            echo "- This usually means the org-level coverage threshold (75%) was not met"
            echo "- Check the coverage value above — if it is below 75%, add more test coverage"
            echo ""
            echo "</details>"

          } >> $GITHUB_STEP_SUMMARY

      # ── Gate ──
      - name: Metadata & test gate
        run: |
          COMP_ERR="${{ steps.deploy.outputs.comp-errors }}"
          FAILING="${{ steps.deploy.outputs.failing }}"
          COVERAGE="${{ steps.deploy.outputs.coverage }}"
          HAS_TESTS="${{ steps.pr-tests.outputs.has-tests }}"

          echo "════════════════════════════"
          echo "  Gate: Validation & Tests"
          echo "  Component errors : ${COMP_ERR:-0}"
          echo "  Failing tests    : ${FAILING:-0}"
          echo "  Coverage         : ${COVERAGE:-N/A}%"
          echo "════════════════════════════"

          [ "${COMP_ERR:-0}" -gt 0 ] && \
            echo "❌ BLOCKED — $COMP_ERR component error(s)" && exit 1

          [ "${FAILING:-0}" -gt 0 ] && \
            echo "❌ BLOCKED — $FAILING test(s) failing" && exit 1

          if [ "$HAS_TESTS" == "true" ] && [ -n "$COVERAGE" ] && \
             [ "$COVERAGE" != "null" ]; then
            if (( $(echo "$COVERAGE < ${{ env.MIN_COVERAGE }}" | bc -l) )); then
              echo "❌ BLOCKED — coverage ${COVERAGE}% is below ${{ env.MIN_COVERAGE }}%"
              exit 1
            fi
          fi

          echo "✅ Passed"